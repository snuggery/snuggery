on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

name: "Test"
jobs:
  build-unit:
    name: Build & Unit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ^24.12
          cache: yarn
      - run: |
          npm i -g corepack
          corepack enable yarn

      - name: Install
        run: |
          yarn install --immutable

      - name: Type-Check
        run: |
          yarn tsc -b

      - name: Build
        run: |
          yarn sn build

      - name: "Run tests"
        run: |
          yarn sn test

      - name: 'Validate help statements (fix w/ "yarn update-help")'
        run: |
          yarn update-help validate

      - name: "Validate CLI dependencies"
        run: |
          yarn sn --validate-cli-dependencies

  integration:
    name: "Integration tests on node.js ${{matrix.node}} on ${{matrix.os}}"
    needs: build-unit
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          # FIXME re-enable once ESM resolution bug is fixed
          # The test commands fail on 20, 22, and 24.0-24.11.x on the line `require("ora")` in `node_modules/@angular-devkit/schematics/tasks/package-manager/executor.js`
          # The ora package is ESM while @angular-devkit/schematics remains CJS
          #
          # - 20.x
          # - 22.x
          - ^24.12
        # include:
        #   # Test on future node LTS
        #   - os: ubuntu-latest
        #     node: 26.x

    steps:
      - uses: actions/checkout@v6
      - name: "Use Node.js ${{matrix.node}}"
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node}}
          cache: yarn
      - run: |
          npm i -g corepack
          corepack enable yarn

      - name: Install
        run: |
          yarn install --immutable

      - name: "Run tests"
        run: |
          yarn sn test integration
